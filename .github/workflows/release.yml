name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 已存在并指向通过 CI 的版本标签
        required: true
        type: string
      ci_run_id:
        description: 产出六目标候选包的成功 CI 运行编号
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - name: 核对标签与 CI 提交完全一致
        env:
          GH_TOKEN: ${{ github.token }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          TAG: ${{ inputs.tag }}
          EXPECTED_TAG: v1.0.0
        shell: bash
        run: |
          set -euo pipefail
          test "$TAG" = "$EXPECTED_TAG"
          grep -Fx '版本 = "1.0.0"' 言序.toml
          test "$(gh run view "$CI_RUN_ID" --json conclusion --jq .conclusion)" = success
          test "$(gh run view "$CI_RUN_ID" --json workflowName --jq .workflowName)" = CI
          test "$(gh run view "$CI_RUN_ID" --json headSha --jq .headSha)" = "$(git rev-list -n 1 "$TAG")"
      - name: 下载已经验收的六目标候选包
        env:
          GH_TOKEN: ${{ github.token }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
        run: gh run download "$CI_RUN_ID" --name yanxu-platform-six-targets --dir release
      - name: 发布 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          (cd release && sha256sum --check yanxu-platform-1.0.0-six-targets.sha256)
          jq -e \
            '.schema == 1 and .package_version == "1.0.0" and
             .profile == "release" and .os == "linux" and .arch == "x86_64" and
             .passed == true and (.cases | length == 4) and
             all(.cases[]; .passed == true)' \
            release/yanxu-platform-1.0.0-performance.json
          gh release create "$TAG" \
            release/yanxu-platform-1.0.0-six-targets.tar.gz \
            release/yanxu-platform-1.0.0-six-targets.sha256 \
            release/yanxu-platform-1.0.0.toml \
            release/yanxu-platform-1.0.0-performance.json \
            --verify-tag --title "言台 1.0.0" \
            --notes-file docs/RELEASE_NOTES_1.0.0.md
